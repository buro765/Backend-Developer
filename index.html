<!DOCTYPE html>
<html>
<head>
    <title>Библиотека</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            font-family: Arial;
            padding: 20px;
            background: white;
            color: black;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 20px; text-align: center; }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-row input {
            padding: 10px;
            border: 1px solid black;
            width: 200px;
        }

        .buttons {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            margin: 0 5px;
            width: 150px;
        }
        button:hover { background: #f0f0f0; }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        th { background: #f0f0f0; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>
<div class="container">
    <h1>Библиотека</h1>

    <div class="input-row">
        <input id="bookInput" placeholder="Название">
        <input id="authorInput" placeholder="Автор">
        <input id="yearInput" type="number" placeholder="Год">
    </div>

    <div class="buttons">
        <button id="addBtn">Добавить</button>
        <button id="deleteBtn">Удалить</button>
        <button id="pushBtn">Обновить</button>
    </div>

    <div id="booksList"></div>
</div>

<script src="index.js" defer></script>л
</body>
</html>

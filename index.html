<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./src/index.ts" defer></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-center">Библиотека</h1>

    <div class="mb-8 flex gap-4">
        <input
                id="bookInput"
                type="text"
                placeholder="Имя книги"
                class="flex-1 p-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <button
                id="addBtn"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors"
        >
            Записать
        </button>
    </div>

    <div id="booksList" class="space-y-3">
        <!-- Книги добавляются динамически -->
    </div>
</div>
</body>
</html>

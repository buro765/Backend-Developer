<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя библиотека</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px; margin: 0 auto; padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .books-list, .controls { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; }
        h2 { color: #333; margin-bottom: 20px; }
        .book {
            display: grid; grid-template-columns: 2fr 1fr 1fr 100px; gap: 15px;
            padding: 15px; border: 1px solid #eee; border-radius: 10px;
            margin-bottom: 10px; align-items: center; background: #f8f9fa; cursor: pointer;
            transition: all 0.3s;
        }
        .book:hover, .book.selected { background: #e3f2fd; border-color: #2196f3; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-sm { padding: 5px 10px; font-size: 14px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .console { background: #2d3748; color: #68d391; padding: 20px; border-radius: 10px; height: 250px; overflow-y: auto; font-family: 'Courier New', monospace; white-space: pre-wrap; }
        .empty { text-align: center; color: #666; font-style: italic; padding: 40px; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<h1>📚 Моя библиотека</h1>
<div class="container">
    <div class="books-list">
        <h2>📖 Список книг хыхых</h2>
        <div id="books-container"></div>
    </div>
    <div class="controls">
        <h2>✏️ Управление</h2>

        <div class="form-group">
            <label>Название:</label>
            <input type="text" id="title" placeholder="Введите название">
        </div>
        <div class="form-group">
            <label>Автор:</label>
            <input type="text" id="author" placeholder="Введите автора">
        </div>
        <div class="form-group">
            <label>Год:</label>
            <input type="number" id="year" min="1800" max="2026" placeholder="Введите год">
        </div>

        <div>
            <button class="btn btn-primary" id="addBtn">➕ Добавить</button>
            <button class="btn btn-warning" id="editBtn">✏️ Изменить</button>
            <button class="btn btn-danger" id="deleteBtn">🗑️ Удалить</button>
        </div>

        <h2>📊 Консоль</h2>
        <div id="console" class="console">🚀 Готов к работе...\n</div>
    </div>
</div>

<!-- TypeScript + браузерная компиляция -->
<script src="https://cdn.jsdelivr.net/npm/esbuild-wasm@0.15.18/esbuild-wasm.min.js"></script>
<script src="app.ts"></script>
</body>
</html>

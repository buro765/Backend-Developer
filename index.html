<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#111827;color:#fff;min-height:100vh;padding:2rem;}
        .container{max-width:48rem;margin:0 auto;}
        h1{font-size:2rem;font-weight:700;margin-bottom:2rem;text-align:center;}
        .form-group{margin-bottom:1rem;}
        .input-row{display:flex;gap:1rem;margin-bottom:1.5rem;}
        input{flex:1;padding:.75rem;background:#1f2937;border:1px solid #374151;border-radius:.5rem;color:#fff;font-size:1rem;}
        input::placeholder{color:#9ca3af;}
        input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
        button{padding:.75rem 2rem;background:#3b82f6;color:#fff;border:none;border-radius:.5rem;font-weight:500;cursor:pointer;transition:background .2s;}
        button:hover{background:#2563eb;}
        .book{padding:1rem;background:#1f2937;border:1px solid #374151;border-radius:.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;transition:background .2s;}
        .book:hover{background:#374151;}
        .book-content{flex:1;}
        .book-title{font-size:1.1rem;font-weight:500;margin-bottom:.25rem;}
        .book-author{font-size:.9rem;color:#9ca3af;}
        .book-id{font-size:.8rem;color:#6b7280;}
    </style>
</head>
<body>
<div class="container">
    <h1>Библиотека</h1>

    <div class="input-row">
        <input id="bookInput" placeholder="Название книги">
        <input id="authorInput" placeholder="Автор">
        <input id="yearInput" type="number" placeholder="Год" min="0">
    </div>

    <div style="display:flex;justify-content:center;">
        <button id="addBtn">Записать</button>
    </div>

    <div id="booksList"></div>
</div>

<script src="index.js" defer></script>
</body>
</html>

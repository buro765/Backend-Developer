<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#111827;color:#fff;min-height:100vh;padding:2rem;}
        .container{max-width:80rem;margin:0 auto;} /* Увеличено */
        h1{font-size:2.5rem;font-weight:700;margin-bottom:2rem;text-align:center;}
        .input-row{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .form-group{flex:1;min-width:200px;}
        label{display:block;margin-bottom:.5rem;font-size:.9rem;color:#9ca3af;}
        input{padding:.75rem;background:#1f2937;border:1px solid #374151;border-radius:.5rem;color:#fff;font-size:1rem;width:100%;}
        input::placeholder{color:#9ca3af;}
        input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
        button{padding:.75rem 2rem;background:#3b82f6;color:#fff;border:none;border-radius:.5rem;font-weight:500;cursor:pointer;transition:background .2s;}
        button:hover{background:#2563eb;}
        .add-button-row{display:flex;justify-content:center;margin-bottom:2rem;}

        /* ✅ ИСПРАВЛЕННЫЙ CSS для таблицы */
        .books-table{
            width:100%;
            border-collapse:collapse;
            margin-top:1rem;
            background:#1f2937;
            border-radius:.5rem;
            overflow:visible; /* ✅ Было hidden */
            box-shadow:0 4px 6px rgba(0,0,0,0.3);
            table-layout:auto; /* ✅ Фиксированная ширина */
        }
        .books-table th{
            padding:1rem;
            font-weight:600;
            background:#374151;
            border-bottom:2px solid #4b5563;
            text-align:left;
            white-space:nowrap; /* ✅ Не переносит заголовки */
        }
        .books-table td{
            padding:1rem;
            border-bottom:1px solid #4b5563;
            word-break:break-word; /* ✅ Перенос длинных названий */
        }
        .books-table tbody tr:hover{background:#374151;transition:background .2s;}
        .books-table tbody tr:last-child td{border-bottom:none;}

        @media (max-width:768px){
            .input-row{flex-direction:column;}
            .form-group{min-width:100%}
            .books-table{font-size:.9rem;}
            .books-table th,.books-table td{padding:.75rem;}
        }
    </style>

</head>
<body>
<div class="container">
    <h1>📚 Библиотека!!!</h1>

    <div class="input-row">
        <div class="form-group">
            <label for="bookInput">Название книги</label>
            <input id="bookInput" placeholder="Введите название">
        </div>
        <div class="form-group">
            <label for="authorInput">Автор</label>
            <input id="authorInput" placeholder="Фамилия Имя">
        </div>
        <div class="form-group">
            <label for="yearInput">Год издания</label>
            <input id="yearInput" type="number" placeholder="Например: 1869" min="0">
        </div>
    </div>

    <div class="add-button-row">
        <button id="addBtn">➕ Записать книгу!</button>
    </div>
    <div class="add-button-row">
        <button id="addtn">➕ Удалить книгу</button>
    </div>

    <div id="booksList"></div>
</div>

<script src="index.js" defer></script>
</body>
</html>

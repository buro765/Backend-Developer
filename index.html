<!DOCTYPE html>
<html lang="ru">
<head>
    <title>CRUD Тестер</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        input, button { margin: 5px; padding: 8px; }
        .book { padding: 10px; border-bottom: 1px solid #451515; cursor: pointer; }
        .book.selected { background: #3d909a; }
        .books-list { margin: 10px 0; }
        .console { background: #000; color: #0f0; padding: 10px; height: 200px; overflow: auto; font-size: 12px; }
    </style>
</head>
<body>
<h2>📚 CRUD API Тестер</h2>

<div>
    <label for="title">Название:</label>
    <input id="title" type="text" placeholder="Название *" required>
    <label for="author">Автор:</label>
    <input id="author" type="text" placeholder="Автор">
    <label for="year">Год:</label>
    <input id="year" type="number" placeholder="Год" min="1800" max="2026">
    <button id="addBtn" type="button">POST</button>
    <button id="editBtn" type="button">PUT</button>
    <button id="deleteBtn" type="button">DELETE</button>
</div>

<h3>GET /books:</h3>
<div id="books" class="books-list"></div>

<h3>Консоль:</h3>
<div id="console" class="console">Готов...</div>

<script src="https://cdn.jsdelivr.net/gh/buro765/Backend-Developer@src/index.ts"></script>
</body>
</html>

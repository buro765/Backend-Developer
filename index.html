<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: white;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 42rem; margin: 0 auto; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; text-align: center; }
        .input-group {
            display: flex; gap: 1rem; margin-bottom: 2rem;
        }
        input {
            flex: 1; padding: 0.75rem;
            background: #1f2937; border: 1px solid #374151;
            border-radius: 0.5rem;
            color: white; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        button {
            padding: 0.75rem 1.5rem;
            background: #3b82f6; color: white;
            border: none; border-radius: 0.5rem;
            font-weight: 500; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        .book {
            padding: 1rem; background: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            display: flex; justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .book:hover { background: #374151; }
        .book-title { font-size: 1.1rem; }
        .book-id { color: #9ca3af; font-size: 0.875rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>Библиотека</h1>

    <div class="input-group">
        <input id="bookInput" type="text" placeholder="Имя книги">
        <button id="addBtn">Записать</button>
    </div>

    <div id="booksList"></div>
</div>

<script src="./dist/index.js" defer></script>
</body>
</html>
